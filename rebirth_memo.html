<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 운동 & 한마디 기록</title>
<style>
  :root {
    --teal: #1D9E75; --teal-dark: #0F6E56; --teal-light: #E1F5EE;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --bg: #FAFAF8; --surface: #F3F2EE;
    --border: rgba(0,0,0,0.08); --text: #1C1C1A; --text-2: #6B6B67; --text-3: #9E9E9A;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .wrapper { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* 헤더 */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-2); background: var(--surface); border: 0.5px solid var(--border); padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .back-btn:hover { background: var(--teal-light); color: var(--teal-dark); }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; }

  /* 필터 탭 */
  .filter-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--teal-dark); color: white; border-color: var(--teal-dark); }

  /* 카드 리스트 */
  .record-list { display: flex; flex-direction: column; gap: 12px; }
  .record-card { background: white; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .record-card.both { border-left: 3px solid var(--teal); }
  .record-card.exercise-only { border-left: 3px solid var(--amber); }
  .record-card.memo-only { border-left: 3px solid #9E9E9A; }

  /* 카드 헤더 */
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-date { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-weight { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
  .change-neg { color: var(--teal-dark); font-weight: 600; }
  .change-pos { color: #D85A30; font-weight: 600; }

  /* 운동 블록 */
  .exercise-block { margin-bottom: 8px; }
  .block-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px; }
  .exercise-text { font-size: 13px; color: var(--text); line-height: 1.7; background: var(--surface); border-radius: 6px; padding: 8px 10px; }

  /* 한마디 블록 */
  .memo-block { margin-top: 6px; }
  .memo-text { font-size: 13px; color: var(--text); line-height: 1.7; font-style: italic; border-left: 2px solid var(--teal-light); padding-left: 10px; }

  /* 빈 상태 */
  .empty { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

  /* 로딩/에러 */
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 0; gap: 1rem; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--teal-light); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-box { display: none; background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: var(--radius-sm); padding: 16px; color: #7F1D1D; font-size: 13px; }
  #main { display: none; }

  @media (max-width: 540px) {
    .wrapper { padding: 1.25rem 0.875rem 3rem; }
    .header { margin-bottom: 1.25rem; }
    .header-title { font-size: 17px; }
    .back-btn { font-size: 12px; padding: 6px 11px; }
    .filter-btn, .tab { font-size: 11px; padding: 5px 11px; }
    .record-card, .recipe-card { padding: 13px 14px; }
    .card-name, .prog-name { font-size: 13px; }
    .filter-row, .tabs { gap: 5px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:var(--text-2)">기록을 불러오는 중...</p>
  </div>
  <div id="error-box">
    ⚠️ 데이터를 불러오지 못했어요.<br>
    <small id="err-msg" style="opacity:0.7;display:block;margin-top:4px"></small>
  </div>

  <div id="main">
    <div class="header">
      <div class="header-left">
        <a class="back-btn" href="rebirth_dashboard.html">← 대시보드로</a>
        <div>
          <div class="header-title">📝 운동 &amp; 한마디</div>
          <div class="header-sub" id="header-sub"></div>
        </div>
      </div>
    </div>

    <!-- 필터 탭 -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('exercise', this)">운동만</button>
      <button class="filter-btn" onclick="setFilter('memo', this)">한마디만</button>
      <button class="filter-btn" onclick="setFilter('both', this)">둘 다 있는 날</button>
    </div>

    <div class="record-list" id="record-list"></div>
  </div>

</div>
<script>
var API_URL  = 'https://script.google.com/macros/s/AKfycbzBwSGnxFWM8UbgqFvpBgkoDTsYgUoQ2koVzBY6o0hu4JndbdwZAvKJk82S7jFNaXOMzQ/exec';
var allRows  = []; // 필터링을 위해 전체 데이터 저장

// ── JSON 파서: 이름 기반이라 컬럼 위치 오류 없음 ────────────
function parseCSV(text) {
  var json = JSON.parse(text);
  var rows = json.map(function(r) {
    return {
      date:     new Date(r.date),
      weight:   parseFloat(r.weight),
      change:   parseFloat(r.change) || 0,
      exercise: r.exercise || '',
      memo:     r.memo || ''
    };
  }).filter(function(r) {
    // 운동 또는 한마디 중 하나라도 있는 날만 표시
    return !isNaN(r.weight) && (r.exercise || r.memo);
  });
  return rows.sort(function(a, b) { return b.date - a.date; }); // 최신순
}

// ── 카드 한 장 HTML 생성 ──────────────────────────────────
function cardHTML(r) {
  var hasEx   = !!r.exercise;
  var hasMemo = !!r.memo;
  var cls     = hasEx && hasMemo ? 'both' : hasEx ? 'exercise-only' : 'memo-only';

  // 스프레드시트 change값 대신 이전 행과 직접 비교
  var rIdx   = rows.indexOf(r);
  var chg    = rIdx > 0 ? parseFloat((r.weight - rows[rIdx-1].weight).toFixed(1)) : 0;
  var chgStr = chg < 0
    ? '<span class="change-neg">' + chg.toFixed(1) + 'kg</span>'
    : chg > 0
    ? '<span class="change-pos">+' + chg.toFixed(1) + 'kg</span>'
    : '<span style="color:var(--text-3)">±0</span>';

  var dateStr = (r.date.getMonth()+1) + '월 ' + r.date.getDate() + '일 ('
    + ['일','월','화','수','목','금','토'][r.date.getDay()] + ')';

  // 줄바꿈 처리 (\n → <br>)
  var exHtml   = r.exercise ? r.exercise.replace(/\n/g, '<br>') : '';
  var memoHtml = r.memo     ? r.memo.replace(/\n/g, '<br>')     : '';

  return '<div class="record-card ' + cls + '" data-ex="' + (hasEx?1:0) + '" data-memo="' + (hasMemo?1:0) + '">'
    + '<div class="card-header">'
    +   '<div class="card-date">' + dateStr + '</div>'
    +   '<div class="card-weight">' + r.weight.toFixed(1) + 'kg &nbsp; ' + chgStr + '</div>'
    + '</div>'
    + (hasEx
        ? '<div class="exercise-block"><div class="block-label">🏃 운동</div><div class="exercise-text">' + exHtml + '</div></div>'
        : '')
    + (hasMemo
        ? '<div class="memo-block"><div class="block-label">📝 한마디</div><div class="memo-text">' + memoHtml + '</div></div>'
        : '')
    + '</div>';
}

// ── 필터 적용 ────────────────────────────────────────────
function setFilter(type, btn) {
  // 버튼 active 토글
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');

  var list = document.getElementById('record-list');
  var filtered = allRows.filter(function(r) {
    if (type === 'all')      return true;
    if (type === 'exercise') return !!r.exercise;
    if (type === 'memo')     return !!r.memo;
    if (type === 'both')     return !!r.exercise && !!r.memo;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">해당하는 기록이 없어요.</div>';
    return;
  }
  list.innerHTML = filtered.map(cardHTML).join('');
}

// ── 데이터 로드 ───────────────────────────────────────────
async function init() {
  try {
    var res  = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    allRows  = parseCSV(text);
    if (allRows.length === 0) throw new Error('기록 데이터가 없어요.');

    // 헤더 부제목: 총 기록 수
    var exCount   = allRows.filter(function(r){ return !!r.exercise; }).length;
    var memoCount = allRows.filter(function(r){ return !!r.memo; }).length;
    document.getElementById('header-sub').textContent =
      '운동 기록 ' + exCount + '일 · 한마디 ' + memoCount + '일';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display    = 'block';
    document.getElementById('record-list').innerHTML = allRows.map(cardHTML).join('');
  } catch(e) {
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('err-msg').textContent     = e.message;
  }
}

init();
</script>
</body>
</html>
