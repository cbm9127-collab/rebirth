<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 Re-birth 성분표</title>
<style>
  :root {
    --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --blue:#185FA5;--blue-light:#EBF4FD;
    --red:#E24B4A;--red-light:#FCEBEB;
    --bg:#FAFAF8;--surface:#F3F2EE;--white:#fff;
    --border:rgba(0,0,0,0.08);--text:#1C1C1A;--text-2:#6B6B67;--text-3:#9E9E9A;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrapper{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

  /* 헤더 */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);background:var(--surface);border:0.5px solid var(--border);padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;text-decoration:none;transition:background 0.15s;}
  .back-btn:hover{background:var(--teal-light);color:var(--teal-dark);}
  .header-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text-3);margin-top:3px;}

  /* 목표 배너 */
  .goal-banner{background:var(--teal-light);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:1.25rem;font-size:13px;color:var(--teal-dark);font-weight:500;line-height:1.6;}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tab{font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;}
  .tab.active{background:var(--teal-dark);color:white;border-color:var(--teal-dark);}

  /* 섹션 타이틀 */
  .sec-title{font-size:13px;font-weight:700;color:var(--text);margin:1rem 0 8px;padding-bottom:6px;border-bottom:1.5px solid var(--teal-light);}

  /* 영양 카드 */
  .meal-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
  .meal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);cursor:pointer;user-select:none;}
  .meal-header:hover{background:#EAF5F0;}
  .meal-name{font-size:14px;font-weight:700;color:var(--text);}
  .meal-arrow{font-size:12px;color:var(--text-3);transition:transform 0.2s;}
  .meal-arrow.open{transform:rotate(180deg);}
  .meal-body{display:none;padding:0 0 12px;}
  .meal-body.open{display:block;}

  /* 영양 요약 뱃지 */
  .nutrient-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 4px;}
  .n-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
  .n-kcal{background:#FEF3C7;color:#92400E;}
  .n-pro {background:#D1FAE5;color:#065F46;}
  .n-carb{background:#DBEAFE;color:#1E40AF;}
  .n-fat {background:#FCE7F3;color:#9D174D;}
  .n-na  {background:#FEE2E2;color:#991B1B;}

  /* 재료 테이블 */
  .ing-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
  .ing-table th{background:rgba(0,0,0,0.03);font-size:10px;font-weight:700;color:var(--text-3);text-align:left;padding:6px 16px;letter-spacing:0.3px;}
  .ing-table td{padding:7px 16px;border-top:0.5px solid var(--border);color:var(--text);}
  .ing-table tr:hover td{background:var(--surface);}
  .note-cell{font-size:10px;color:var(--text-3);max-width:160px;}

  /* 합계 행 */
  .total-row td{font-weight:700;background:var(--teal-light);color:var(--teal-dark);}

  /* 일별 합계 */
  .day-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
  .day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .day-name{font-size:15px;font-weight:700;color:var(--text);}
  .day-menu{font-size:12px;color:var(--text-2);margin-top:2px;}
  .day-nutrients{display:flex;gap:6px;flex-wrap:wrap;}
  .day-warn{font-size:11px;color:var(--red);margin-top:6px;font-weight:500;}
  .goal-row{background:var(--teal-light);border-radius:var(--radius-sm);padding:10px 16px;margin-bottom:10px;font-size:12px;color:var(--teal-dark);font-weight:600;}

  /* 영양제 */
  .supp-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
  .supp-name{font-size:14px;font-weight:700;color:var(--text);}
  .supp-timing{font-size:11px;color:var(--teal-dark);font-weight:600;background:var(--teal-light);padding:2px 8px;border-radius:12px;margin-top:4px;display:inline-block;}
  .supp-note{font-size:12px;color:var(--text-2);margin-top:6px;line-height:1.5;}
  .supp-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:#FEE2E2;color:#991B1B;}
  .supp-badge.required{background:var(--teal-light);color:var(--teal-dark);}

  @media(max-width:540px){
    .wrapper{padding:1rem 0.875rem 3rem;}
    .header-title{font-size:17px;}
    .ing-table{font-size:11px;}
    .ing-table th,.ing-table td{padding:5px 10px;}
    .note-cell{display:none;}
    .meal-name{font-size:13px;}
  }
</style>
</head>

function badge(kcal,pro,carb,fat,na){
  return '<span class="n-badge n-kcal">'+kcal+'kcal</span>'
    +'<span class="n-badge n-pro">단백질 '+pro+'g</span>'
    +'<span class="n-badge n-carb">탄수 '+carb+'g</span>'
    +'<span class="n-badge n-fat">지방 '+fat+'g</span>'
    +'<span class="n-badge n-na">나트륨 '+na+'mg</span>';
}

function ingTable(items, total){
  var html = '<table class="ing-table">'
    +'<thead><tr><th>식품명</th><th>섭취량</th><th>칼로리</th><th>단백질</th><th>탄수화물</th><th>지방</th><th>나트륨</th><th class="note-cell">비고</th></tr></thead><tbody>';
  items.forEach(function(it){
    html += '<tr><td>'+it.food+'</td><td>'+it.amount+'</td><td>'+it.kcal+'</td><td>'+it.pro+'</td><td>'+it.carb+'</td><td>'+it.fat+'</td><td>'+it.na+'</td><td class="note-cell">'+it.note+'</td></tr>';
  });
  html += '<tr class="total-row"><td colspan="2">합계</td><td>'+total.kcal+'</td><td>'+total.pro+'</td><td>'+total.carb+'</td><td>'+total.fat+'</td><td>'+total.na+'</td><td class="note-cell">'+(total.note||'')+'</td></tr>';
  html += '</tbody></table>';
  return html;
}

function setTab(tab, btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var el = document.getElementById('tab-content');
  var html = '';

  if(tab === 'morning'){
    var d = DATA.morning;
    html += '<div class="sec-title">'+d.title+'</div>';
    html += '<div class="meal-card"><div class="meal-header" onclick="toggleCard(\'m0\')"><span class="meal-name">아침 식단 구성</span><span class="meal-arrow" id="arr-m0">▼</span></div><div class="meal-body" id="body-m0">';
    html += '<div class="nutrient-row">';
    d.totals.forEach(function(t){ html += '<div style="margin-bottom:6px;width:100%;"><span style="font-size:11px;font-weight:600;color:var(--text-2);">'+t.label+'</span><br><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;">'+badge(t.kcal,t.pro,t.carb,t.fat,t.na)+'</div></div>'; });
    html += '</div>';
    html += '<table class="ing-table"><thead><tr><th>식품명</th><th>섭취량</th><th>칼로리</th><th>단백질</th><th>탄수화물</th><th>지방</th><th>나트륨</th><th class="note-cell">비고</th></tr></thead><tbody>';
    d.meals.forEach(function(m){
      html += '<tr><td>'+m.name+'</td><td>'+m.amount+'</td><td>'+m.kcal+'</td><td>'+m.pro+'</td><td>'+m.carb+'</td><td>'+m.fat+'</td><td>'+m.na+'</td><td class="note-cell">'+m.note+'</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  else if(tab === 'lunch'){
    DATA.lunch.forEach(function(meal, i){
      var id = 'l'+i;
      html += '<div class="meal-card"><div class="meal-header" onclick="toggleCard(\''+id+'\')"><span class="meal-name">'+meal.name+'</span><span class="meal-arrow" id="arr-'+id+'">▼</span></div>'
        + '<div class="meal-body" id="body-'+id+'">'
        + '<div class="nutrient-row">'+badge(meal.total.kcal,meal.total.pro,meal.total.carb,meal.total.fat,meal.total.na)+'</div>'
        + ingTable(meal.items, meal.total)
        + '</div></div>';
    });
  }

  else if(tab === 'dinner'){
    var d = DATA.dinner;
    html += '<div class="sec-title">'+d.title+'</div>';
    html += '<div class="meal-card"><div class="meal-header" onclick="toggleCard(\'d0\')"><span class="meal-name">저녁 식단 구성</span><span class="meal-arrow" id="arr-d0">▼</span></div><div class="meal-body" id="body-d0">';
    html += '<div class="nutrient-row">';
    d.totals.forEach(function(t){ html += '<div style="margin-bottom:6px;width:100%;"><span style="font-size:11px;font-weight:600;color:var(--text-2);">'+t.label+'</span><br><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;">'+badge(t.kcal,t.pro,t.carb,t.fat,t.na)+'</div></div>'; });
    html += '</div>';
    html += ingTable(d.items, d.totals[0]);
    html += '</div></div>';
  }

  else if(tab === 'daily'){
    html += '<div class="goal-row">🎯 목표: 1,150kcal | 단백질 94g | 순탄수 60.5g | 나트륨 1,086mg 이하</div>';
    DATA.daily.forEach(function(d){
      html += '<div class="day-card">'
        +'<div class="day-header"><div><div class="day-name">'+d.day+'요일</div><div class="day-menu">'+d.menu+' · '+d.type+'</div></div></div>'
        +'<div class="day-nutrients">'+badge(d.kcal,d.pro,d.carb,d.fat,d.na)+'</div>'
        +(d.warn ? '<div class="day-warn">⚠️ '+d.warn+'</div>' : '')
        +'</div>';
    });
  }

  else if(tab === 'supp'){
    DATA.supp.forEach(function(s){
      html += '<div class="supp-card">'
        +'<div><div class="supp-name">'+s.name+'</div><div class="supp-timing">'+s.timing+'</div><div class="supp-note">'+s.note+'</div></div>'
        +'<span class="supp-badge'+(s.required?' required':'')+'">'+( s.required ? '필수' : '비상약')+'</span>'
        +'</div>';
    });
  }

  el.innerHTML = html;
}

function toggleCard(id){
  var body = document.getElementById('body-'+id);
  var arr  = document.getElementById('arr-'+id);
  var open = body.classList.toggle('open');
  arr.classList.toggle('open', open);
}

// 초기 렌더
setTab('morning', document.querySelector('.tab.active'));
</script>
</body>
</html>
