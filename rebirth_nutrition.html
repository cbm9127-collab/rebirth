<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 Re-birth 식단 레시피 & 영양 성분표</title>
<style>
  :root{
    --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --blue:#185FA5;--blue-light:#EBF4FD;
    --purple:#7C3AED;--purple-light:#EDE9FE;
    --bg:#FAFAF8;--surface:#F3F2EE;--white:#fff;
    --border:rgba(0,0,0,0.08);--text:#1C1C1A;--text-2:#6B6B67;--text-3:#9E9E9A;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrapper{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

  .header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);background:var(--surface);border:0.5px solid var(--border);padding:7px 14px;border-radius:var(--radius-sm);text-decoration:none;transition:background 0.15s;}
  .back-btn:hover{background:var(--teal-light);color:var(--teal-dark);}
  .header-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text-3);margin-top:3px;}

  /* Phase 토글 */
  .phase-toggle{display:flex;gap:6px;margin-bottom:1rem;background:var(--surface);border-radius:var(--radius);padding:6px;border:0.5px solid var(--border);}
  .phase-btn{flex:1;padding:12px 8px;border-radius:var(--radius-sm);border:none;background:transparent;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;color:var(--text-3);line-height:1.4;}
  .phase-btn.p1.active{background:var(--amber-light);color:var(--amber);box-shadow:0 2px 8px rgba(186,117,23,0.15);}
  .phase-btn.p2.active{background:var(--purple-light);color:var(--purple);box-shadow:0 2px 8px rgba(124,58,237,0.15);}
  .phase-btn:not(.active):hover{background:rgba(0,0,0,0.03);}

  .phase-desc{font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:1rem;line-height:1.6;border:0.5px solid var(--border);}
  .phase-desc.pd1{background:var(--amber-light);color:var(--amber);border-color:rgba(186,117,23,0.2);}
  .phase-desc.pd2{background:var(--purple-light);color:var(--purple);border-color:rgba(124,58,237,0.2);}

  /* 목표 배너 */
  .goal-banner{background:var(--teal-light);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:1.25rem;}
  .goal-title{font-size:13px;font-weight:700;color:var(--teal-dark);margin-bottom:8px;}
  .goal-items{display:flex;flex-wrap:wrap;gap:8px 16px;}
  .goal-item{font-size:13px;font-weight:600;color:var(--teal-dark);}
  .goal-val{font-size:16px;font-weight:800;}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tab{font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;}
  .tab.active{background:var(--teal-dark);color:white;border-color:var(--teal-dark);}

  /* 하루 합계 */
  .day-summary{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;}
  .day-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:8px;}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
  .badge{font-size:13px;font-weight:700;padding:4px 11px;border-radius:20px;}
  .b-kcal{background:#FEF3C7;color:#92400E;}
  .b-pro{background:#D1FAE5;color:#065F46;}
  .b-carb{background:#DBEAFE;color:#1E40AF;}
  .b-na{background:#FEE2E2;color:#991B1B;}
  .b-ok{background:var(--teal-light);color:var(--teal-dark);}
  .day-note{font-size:12px;color:var(--text-2);}

  /* 식사 카드 */
  .meal-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .meal-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:var(--surface);cursor:pointer;user-select:none;}
  .meal-hdr:hover{background:#EAF5F0;}
  .time-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;margin-right:8px;flex-shrink:0;}
  .t-am{background:#FEF9EC;color:#92400E;}
  .t-lu{background:var(--teal-light);color:var(--teal-dark);}
  .t-di{background:#EBF4FD;color:#185FA5;}
  .t-pr{background:var(--purple-light);color:var(--purple);}
  .meal-name-wrap{flex:1;}
  .meal-name{font-size:14px;font-weight:700;}
  .meal-sub{font-size:12px;color:var(--text-3);margin-top:1px;}
  .arr{font-size:11px;color:var(--text-3);transition:transform 0.2s;margin-left:8px;flex-shrink:0;}
  .arr.open{transform:rotate(180deg);}
  .meal-body{display:none;padding:15px;}
  .meal-body.open{display:block;}

  .n-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .n-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
  .n-kcal{background:#FEF3C7;color:#92400E;}
  .n-pro{background:#D1FAE5;color:#065F46;}
  .n-carb{background:#DBEAFE;color:#1E40AF;}
  .n-fat{background:#FCE7F3;color:#9D174D;}
  .n-na{background:#FEE2E2;color:#991B1B;}

  .tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
  .tbl th{background:rgba(0,0,0,0.03);font-size:10px;font-weight:700;color:var(--text-3);text-align:left;padding:5px 9px;}
  .tbl td{padding:5px 9px;border-top:0.5px solid var(--border);}
  .tbl .tr td{font-weight:700;background:var(--teal-light);color:var(--teal-dark);}

  .div{height:1px;background:var(--border);margin:12px 0;}
  .blk{margin-bottom:10px;}
  .blk-label{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:5px;}
  .blk-label-warn{font-size:10px;font-weight:700;color:#92400E;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:5px;}
  .blk-label-tip{font-size:10px;font-weight:700;color:var(--teal-dark);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:5px;}
  .blk-txt{font-size:13px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;}
  .blk-txt.steps{border-left:2px solid var(--teal-light);background:transparent;padding-left:12px;}
  .gout-blk{background:#FEF9EC;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;font-size:12px;color:#92400E;line-height:1.7;}
  .tip-blk{background:var(--teal-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--teal-dark);line-height:1.7;}

  .weekly-card{background:var(--white);border:1.5px solid var(--teal);border-radius:var(--radius);padding:13px 15px;margin-bottom:12px;}
  .weekly-title{font-size:12px;font-weight:700;color:var(--teal-dark);margin-bottom:7px;}

  @media(max-width:540px){
    .wrapper{padding:1rem 0.875rem 3rem;}
    .header-title{font-size:17px;}
    .tbl{font-size:11px;}
    .tbl th,.tbl td{padding:4px 6px;}
    .meal-name{font-size:13px;}
    .tabs{gap:4px;}
    .tab{font-size:11px;padding:6px 10px;}
    .phase-btn{font-size:12px;padding:10px 4px;}
    .goal-val{font-size:14px;}
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <a class="back-btn" href="rebirth_dashboard.html">← 대시보드로</a>
    <div>
      <div class="header-title">🥗 식단 레시피 &amp; 영양 성분표</div>
      <div class="header-sub">Re-birth 프로젝트 전용 식단 모음</div>
    </div>
  </div>

  <div class="phase-toggle">
    <button class="phase-btn p1 active" onclick="setPhase(1,this)">Phase 1<br><span style="font-size:10px;font-weight:500;">전통 메뉴 + 볶음밥 저녁</span></button>
    <button class="phase-btn p2" onclick="setPhase(2,this)">Phase 2<br><span style="font-size:10px;font-weight:500;">밀프랩 점심 + 오트밀 저녁</span></button>
  </div>

  <div id="phase-desc"></div>

  <div class="goal-banner">
    <div class="goal-title">🎯 일일 목표 (주간 평균 기준)</div>
    <div class="goal-items">
      <div class="goal-item">칼로리 <span class="goal-val">≤1,500</span>kcal</div>
      <div class="goal-item">단백질 <span class="goal-val">≥110</span>g</div>
      <div class="goal-item">탄수화물 <span class="goal-val">85~90</span>g</div>
      <div class="goal-item">나트륨 <span class="goal-val">≤1,500</span>mg</div>
      <div class="goal-item">당류 <span class="goal-val">≤25</span>g</div>
    </div>
  </div>

  <div id="tabs-wrap"></div>
  <div id="tab-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  Phase 1 공통 아침
// ═══════════════════════════════════════════════════════════
var P1_AM3030={time:'아침',badge:'t-am',name:'더단백+요프로+계란1+키위+유산균',

  ],

  steps:'조리 없이 그대로 섭취합니다.\n기상 후 30분 이내 → 유산균 먼저 → 단백질 음료 → 요프로 → 계란 → 키위 순서 권장',
  gout:'',tip:'키위는 비타민C 93mg — 요산 배출에 도움이 돼요.'
};
var P1_AMBASIC={time:'아침',badge:'t-am',name:'더단백+계란2+키위+유산균',
  kcal:321,pro:33,carb:23,fat:'-',na:187,

    {food:'더단백 초코/카라멜',amt:'1병(250ml)',kcal:105,pro:20,carb:6,fat:1,na:50},
    {food:'계란',amt:'2개',kcal:150,pro:12.4,carb:1.2,fat:10,na:130},
    {food:'키위',amt:'1개(100g)',kcal:61,pro:1.1,carb:14.7,fat:0.5,na:2},

  ],
  ing:'더단백 초코/카라멜 1병(250ml)\n계란 2개\n키위 1개\n유산균(락토핏) 1포',
  steps:'조리 없이 그대로 섭취합니다.\n계란은 노른자 터트려 완전히 익혀서 섭취 (소화율 91%)',
  gout:'',tip:''
};

// ═══════════════════════════════════════════════════════════
//  Phase 2 공통 아침
// ═══════════════════════════════════════════════════════════
var P2_AM3030={time:'아침',badge:'t-am',name:'30/30/30 — 더단백+요프로+계란1+키위+유산균',
  kcal:330,pro:42,carb:31,fat:3,na:207,
  items:[
    {food:'더단백 초코/카라멜',amt:'1병(250ml)',kcal:105,pro:20,carb:6,fat:1,na:50},
    {food:'요프로 플레인',amt:'1개(150g)',kcal:84,pro:15,carb:8,fat:1.5,na:85},
    {food:'오메가 구운계란',amt:'1개(40g)',kcal:50,pro:5,carb:0.5,fat:2.9,na:60},
    {food:'키위',amt:'1개(100g)',kcal:61,pro:1.1,carb:14.7,fat:0.5,na:2},
    {food:'유산균(락토핏)',amt:'1포',kcal:5,pro:0,carb:1,fat:0,na:5}
  ],
  ing:'더단백 초코/카라멜 1병\n요프로 플레인 1개\n오메가 구운계란 1개\n키위 1개\n유산균(락토핏) 1포',
  steps:'기상 후 30분 이내\n① 유산균 → ② 더단백 → ③ 요프로 → ④ 구운계란 → ⑤ 키위',
  gout:'',tip:'요프로의 당은 유당 — 과당 아님, 통풍 영향 없음'

var P2_AMBASIC={time:'아침',badge:'t-am',name:'기본 — 더단백+계란2+키위+유산균',
  kcal:321,pro:33,carb:23,fat:7,na:187,
  items:[
    {food:'더단백 초코/카라멜',amt:'1병(250ml)',kcal:105,pro:20,carb:6,fat:1,na:50},
    {food:'오메가 구운계란',amt:'2개(80g)',kcal:100,pro:10,carb:1,fat:5.8,na:120},

  steps:'기상 후 섭취. 별도 조리 없음.',
  gout:'',tip:''
};

// ═══════════════════════════════════════════════════════════
//  Phase 2 저녁 생성 함수
// ═══════════════════════════════════════════════════════════
function mkDinner(mn,mk,mp,mc,mna,oatg){
  oatg=oatg||40;
  var ok=Math.round(148*(oatg/40));
  var oc=Math.round(27*(oatg/40)*10)/10;
  var op=Math.round(5*(oatg/40)*10)/10;
  var tk=ok+150+10+45+20+210+mk;
  var tp=Math.round((op+12.4+0.5+19+mp)*10)/10;
  var tc=Math.round((oc+1.2+1+4+mc)*10)/10;
  var tn=5+130+28+2+15+mna;
  var note=oatg>40?' ★오트밀 60g':'';
  return {
    time:'저녁',badge:'t-di',
    name:'오트밀죽+두부1모+미트리 '+mn+note,
    kcal:tk,pro:tp,carb:tc,fat:'-',na:tn,
    items:[
      {food:'오트밀(롤드오츠)',amt:oatg+'g',kcal:ok,pro:op,carb:oc,fat:2,na:5},
      {food:'계란',amt:'2개',kcal:150,pro:12.4,carb:1.2,fat:10,na:130},
      {food:'조미김',amt:'6장(2g)',kcal:10,pro:0,carb:0,fat:0.9,na:28},
      {food:'참기름',amt:'5ml',kcal:45,pro:0,carb:0,fat:5,na:0},
      {food:'들깨가루',amt:'약간',kcal:20,pro:0.5,carb:1,fat:1,na:2},
      {food:'두부',amt:'1모(300g)',kcal:210,pro:19,carb:4,fat:11,na:15},
      {food:'미트리 스테이크 '+mn,amt:'1개(100g)',kcal:mk,pro:mp,carb:mc,fat:'-',na:mna}
    ],
    ing:'오트밀 '+oatg+'g\n계란 2개\n조미김 6장, 참기름 5ml, 들깨가루 약간\n두부 1모(300g)\n미트리 스테이크 '+mn+' 1개',
    steps:'[전자레인지 방식]\n① 오트밀+물(180ml)+미리 푼 계란 2개 넣고 섞기\n② 700W 3분 → 꺼내서 섞기 → 다시 3분\n③ 들깨가루·참기름 뿌려 마무리\n[두부]\n④ 올리브오일에 중불 앞뒤 굽기. 소금 금지\n[미트리]\n⑤ 포장 일부 개봉 → 700W 2분\n⑥ 조미김 6장과 함께 섭취',
    gout:'소금 간 절대 금지\n두부·오트밀 저퓨린 ✅',
    tip:'조미김 6장 나트륨 28mg — 거의 영향 없음'
  };
}

// ═══════════════════════════════════════════════════════════
//  Phase 2 밀프랩 점심 생성 함수
// ═══════════════════════════════════════════════════════════
function mkLunch2(cn,ck,cp,cc,cna,csg){
  var bk=115+27+30+50,bp=3+2.4+2.5+5,bc=28+4.7+5.6+0.5,bn=0+25+5+60;
  return {
    time:'점심',badge:'t-lu',
    name:'밀프랩 — 귀리곤약밥+브로콜리+버섯+'+cn+'+구운계란',
    kcal:bk+ck,pro:Math.round((bp+cp)*10)/10,
    carb:Math.round((bc+cc)*10)/10,fat:'-',na:bn+cna,
    items:[
      {food:'밥대신 귀리곤약즉석밥',amt:'150g',kcal:115,pro:3,carb:28,fat:0,na:0},
      {food:'브로콜리',amt:'80g',kcal:27,pro:2.4,carb:4.7,fat:0.3,na:25},
      {food:'새송이버섯',amt:'100g',kcal:30,pro:2.5,carb:5.6,fat:0.3,na:5},
      {food:'득근파티 '+cn,amt:'1개(100g)',kcal:ck,pro:cp,carb:cc,fat:'-',na:cna},
      {food:'오메가 구운계란',amt:'1개(40g)',kcal:50,pro:5,carb:0.5,fat:2.9,na:60}
    ],

function tblHTML(items,tot){
  var h='<table class="tbl"><thead><tr><th>식품</th><th>섭취량</th><th>칼로리</th><th>단백질</th><th>탄수</th><th>지방</th><th>나트륨</th></tr></thead><tbody>';
  var r=items.map(function(it){return '<tr><td>'+it.food+'</td><td>'+it.amt+'</td><td>'+it.kcal+'</td><td>'+it.pro+'</td><td>'+it.carb+'</td><td>'+it.fat+'</td><td>'+it.na+'</td></tr>';}).join('');
  if(!tot||tot.kcal===0) return h+r+'</tbody></table>';
  var b='<div class="n-badges"><span class="n-badge n-kcal">'+tot.kcal+'kcal</span><span class="n-badge n-pro">단백질 '+tot.pro+'g</span><span class="n-badge n-carb">탄수 '+tot.carb+'g</span>'+(tot.fat&&tot.fat!=='-'?'<span class="n-badge n-fat">지방 '+tot.fat+'g</span>':'')+'<span class="n-badge n-na">나트륨 '+tot.na+'mg</span></div>';
  return b+h+r+'<tr class="tr"><td colspan="2">합계</td><td>'+tot.kcal+'</td><td>'+tot.pro+'</td><td>'+tot.carb+'</td><td>'+tot.fat+'</td><td>'+tot.na+'</td></tr></tbody></table>';
}

function cardHTML(m,idx){

    +'<div class="meal-name-wrap"><div class="meal-name">'+m.name+'</div>'+(m.kcal>0?'<div class="meal-sub">'+m.kcal+'kcal · 단백질 '+m.pro+'g</div>':'')+'</div>'
    +'<span class="arr" id="arr'+idx+'">▼</span>'
    +'</div>'
    +'<div class="meal-body" id="mb'+idx+'">'
    +tblHTML(m.items,{kcal:m.kcal,pro:m.pro,carb:m.carb,fat:m.fat,na:m.na})
    +'<div class="div"></div>'
    +'<div class="blk"><div class="blk-label">🛒 재료</div><div class="blk-txt">'+m.ing+'</div></div>'
    +'<div class="blk"><div class="blk-label">👨‍🍳 조리 순서</div><div class="blk-txt steps">'+m.steps+'</div></div>'
    +(m.gout?'<div class="blk"><div class="blk-label-warn">⚠️ 통풍 관리</div><div class="gout-blk">'+m.gout+'</div></div>':'')
    +(m.tip?'<div class="blk"><div class="blk-label-tip">💡 요리 팁</div><div class="tip-blk">'+m.tip+'</div></div>':'')
    +'</div></div>';
}

function tog(id){
  var b=document.getElementById(id);
  var i=id.replace('mb','');
  var a=document.getElementById('arr'+i);
  var o=b.classList.toggle('open');
  if(a) a.classList.toggle('open',o);
}

function renderTabs(ph){
  var data=PHASES[ph];
  var tw=document.getElementById('tabs-wrap');
  var html='<div class="tabs">';
  data.tabs.forEach(function(t,i){
    html+='<button class="tab'+(i===0?' active':'')+'" onclick="setTab(\''+data.keys[i]+'\',this)">'+t+'</button>';
  });
  tw.innerHTML=html+'</div>';
}

function setTab(key,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  curKey=key;
  var data=PHASES[curPhase];
  var day=data.days[key];
  var el=document.getElementById('tab-content');
  var html='';

  // 주간 평균
  if(key==='prep'){
    var wk;
    if(curPhase===1) wk={kcal:1499,pro:117,carb:74,na:1247};
    else wk={kcal:1434,pro:129,carb:93,na:1143,sugar:12};
    html+='<div class="weekly-card"><div class="weekly-title">📊 주간 평균</div>'
      +'<div class="badges"><span class="badge b-kcal">'+wk.kcal+'kcal</span><span class="badge b-pro">단백질 '+wk.pro+'g</span><span class="badge b-carb">탄수 '+wk.carb+'g</span><span class="badge b-na">나트륨 '+wk.na+'mg</span>'+(wk.sugar?'<span class="badge b-ok">당류 '+wk.sugar+'g</span>':'')+'</div></div>';
  }

  if(day.sum){
    var s=day.sum;
    html+='<div class="day-summary"><div class="day-title">'+day.label+' 합계 <span style="font-size:11px;font-weight:500;color:var(--text-3);">'+day.tag+'</span></div>'
      +'<div class="badges"><span class="badge b-kcal">'+s.kcal+'kcal</span><span class="badge b-pro">단백질 '+s.pro+'g</span><span class="badge b-carb">탄수 '+s.carb+'g</span><span class="badge b-na">나트륨 '+s.na+'mg</span>'+(s.sugar?'<span class="badge b-ok">당류 '+s.sugar+'g</span>':'')+'</div>'
      +'<div class="day-note">'+s.note+'</div></div>';
  }
  day.meals.forEach(function(m,i){html+=cardHTML(m,key+i);});
  el.innerHTML=html;
}

function setPhase(ph,btn){
  curPhase=ph;
  document.querySelectorAll('.phase-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('phase-desc').innerHTML='<div class="phase-desc '+PHASE_CLS[ph]+'">'+PHASE_DESCS[ph]+'</div>';
  renderTabs(ph);
  autoSelectToday();
}

function autoSelectToday(){
  var data=PHASES[curPhase];
  var dm={0:'sun',1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat'};
  var today=dm[new Date().getDay()];
  if(curPhase===1 && (today==='thu'||today==='sat')){
    today='thsat';
  }
  var idx=data.keys.indexOf(today);
  if(idx<0) idx=0;
  var tabs=document.querySelectorAll('.tab');
  if(tabs[idx]) setTab(data.keys[idx],tabs[idx]);
}

// 초기 로드
document.getElementById('phase-desc').innerHTML='<div class="phase-desc pd1">'+PHASE_DESCS[1]+'</div>';
renderTabs(1);
autoSelectToday();
</script>
</body>
