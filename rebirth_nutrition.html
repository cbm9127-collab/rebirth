<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 Re-birth 식단 레시피 & 영양 성분표</title>
<style>
  :root {
    --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --blue:#185FA5;--blue-light:#EBF4FD;
    --red:#E24B4A;--red-light:#FCEBEB;
    --bg:#FAFAF8;--surface:#F3F2EE;--white:#fff;
    --border:rgba(0,0,0,0.08);--text:#1C1C1A;--text-2:#6B6B67;--text-3:#9E9E9A;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrapper{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

  /* 헤더 */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);background:var(--surface);border:0.5px solid var(--border);padding:7px 14px;border-radius:var(--radius-sm);text-decoration:none;transition:background 0.15s;}
  .back-btn:hover{background:var(--teal-light);color:var(--teal-dark);}
  .header-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text-3);margin-top:3px;}

  /* 목표 배너 */
  .goal-banner{background:var(--teal-light);border-radius:var(--radius-sm);padding:18px 20px;margin-bottom:1.25rem;font-size:16px;color:var(--teal-dark);font-weight:700;line-height:2;}
  .goal-banner .goal-items{display:flex;flex-wrap:wrap;gap:10px 20px;margin-top:6px;}
  .goal-item{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;}
  .goal-val{font-size:18px;font-weight:800;color:var(--teal-dark);}
  .goal-note{font-size:11px;color:var(--teal-dark);opacity:0.75;font-weight:500;}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tab{font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;}
  .tab.active{background:var(--teal-dark);color:white;border-color:var(--teal-dark);}

  /* 하루 합계 카드 */
  .day-summary{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
  .day-summary-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:10px;}
  .day-badges{display:flex;flex-wrap:wrap;gap:6px;}
  .d-badge{font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;}
  .d-kcal{background:#FEF3C7;color:#92400E;}
  .d-pro {background:#D1FAE5;color:#065F46;}
  .d-carb{background:#DBEAFE;color:#1E40AF;}
  .d-na  {background:#FEE2E2;color:#991B1B;}
  .d-ok  {background:var(--teal-light);color:var(--teal-dark);}
  .d-warn{background:#FEF9EC;color:#92400E;}

  /* 식사별 카드 */
  .meal-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .meal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);cursor:pointer;user-select:none;}
  .meal-header:hover{background:#EAF5F0;}
  .meal-time-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-right:8px;flex-shrink:0;}
  .badge-morning{background:#FEF9EC;color:#92400E;}
  .badge-lunch  {background:var(--teal-light);color:var(--teal-dark);}
  .badge-dinner {background:#EBF4FD;color:#185FA5;}
  .meal-name-wrap{flex:1;}
  .meal-name{font-size:14px;font-weight:700;color:var(--text);}
  .meal-kcal{font-size:12px;font-weight:600;color:var(--text-3);margin-top:2px;}
  .meal-arrow{font-size:12px;color:var(--text-3);transition:transform 0.2s;flex-shrink:0;margin-left:8px;}
  .meal-arrow.open{transform:rotate(180deg);}
  .meal-body{display:none;padding:16px;}
  .meal-body.open{display:block;}

  /* 영양 뱃지 */
  .n-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .n-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
  .n-kcal{background:#FEF3C7;color:#92400E;}
  .n-pro {background:#D1FAE5;color:#065F46;}
  .n-carb{background:#DBEAFE;color:#1E40AF;}
  .n-fat {background:#FCE7F3;color:#9D174D;}
  .n-na  {background:#FEE2E2;color:#991B1B;}
  .n-warn{font-size:11px;color:#991B1B;font-weight:600;margin-bottom:8px;}

  /* 성분 테이블 */
  .ing-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;}
  .ing-table th{background:rgba(0,0,0,0.03);font-size:10px;font-weight:700;color:var(--text-3);text-align:left;padding:6px 10px;}
  .ing-table td{padding:6px 10px;border-top:0.5px solid var(--border);color:var(--text);}
  .ing-table .total-row td{font-weight:700;background:var(--teal-light);color:var(--teal-dark);}

  /* 레시피 블록 */
  .divider{height:1px;background:var(--border);margin:14px 0;}
  .block{margin-bottom:12px;}
  .block-label{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
  .block-content{font-size:13px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;}
  .block-content.steps{border-left:2px solid var(--teal-light);background:transparent;padding-left:12px;}
  .gout-block{background:#FEF9EC;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;font-size:12px;color:#92400E;line-height:1.7;}
  .tip-block{background:var(--teal-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--teal-dark);line-height:1.7;}
  .block-label-warn{font-size:10px;font-weight:700;color:#92400E;letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
  .block-label-tip{font-size:10px;font-weight:700;color:var(--teal-dark);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}

  @media(max-width:540px){
    .wrapper{padding:1rem 0.875rem 3rem;}
    .header-title{font-size:17px;}
    .goal-banner{font-size:14px;}
    .goal-val{font-size:16px;}
    .ing-table{font-size:11px;}
    .ing-table th,.ing-table td{padding:5px 7px;}
    .meal-name{font-size:13px;}
    .tabs{gap:4px;}
    .tab{font-size:11px;padding:6px 10px;}
  }
</style>
</head>

</div>

// ── 렌더 함수 ────────────────────────────────────────────
function nTableHTML(items, total) {
  var rows = items.map(function(it){
    return '<tr><td>'+it.food+'</td><td>'+it.amount+'</td>'
      +'<td>'+it.kcal+'</td><td>'+it.pro+'</td><td>'+it.carb+'</td>'
      +'<td>'+it.fat+'</td><td>'+it.na+'</td></tr>';
  }).join('');
  return '<div class="n-badges">'
    +'<span class="n-badge n-kcal">'+total.kcal+'kcal</span>'
    +'<span class="n-badge n-pro">단백질 '+total.pro+'g</span>'
    +'<span class="n-badge n-carb">탄수 '+total.carb+'g</span>'
    +(total.fat !== '-' ? '<span class="n-badge n-fat">지방 '+total.fat+'g</span>' : '')
    +'<span class="n-badge n-na">나트륨 '+total.na+'mg</span>'
    +'</div>'
    +'<table class="ing-table"><thead><tr><th>식품</th><th>섭취량</th><th>칼로리</th><th>단백질</th><th>탄수</th><th>지방</th><th>나트륨</th></tr></thead>'
    +'<tbody>'+rows
    +'<tr class="total-row"><td colspan="2">합계</td><td>'+total.kcal+'</td><td>'+total.pro+'</td><td>'+total.carb+'</td><td>'+total.fat+'</td><td>'+total.na+'</td></tr>'
    +'</tbody></table>';
}

function mealCardHTML(m, idx) {
  return '<div class="meal-card">'
    +'<div class="meal-header" onclick="toggle(\'m'+idx+'\')">'
    +'<span class="meal-time-badge badge-'+m.badge+'">'+m.time+'</span>'
    +'<div class="meal-name-wrap">'
    +'<div class="meal-name">'+m.name+'</div>'
    +'<div class="meal-kcal">'+m.kcal+'kcal · 단백질 '+m.pro+'g</div>'
    +'</div>'
    +'<span class="meal-arrow" id="arr'+idx+'">▼</span>'
    +'</div>'
    +'<div class="meal-body" id="m'+idx+'">'
    + nTableHTML(m.items, {kcal:m.kcal, pro:m.pro, carb:m.carb, fat:m.fat, na:m.na})
    +'<div class="divider"></div>'
    +'<div class="block"><div class="block-label">🛒 재료</div><div class="block-content">'+m.ingredients+'</div></div>'
    +'<div class="block"><div class="block-label">👨‍🍳 조리 순서</div><div class="block-content steps">'+m.steps+'</div></div>'
    +(m.gout ? '<div style="margin-bottom:10px;"><div class="block-label-warn">⚠️ 통풍 관리 핵심</div><div class="gout-block">'+m.gout+'</div></div>' : '')
    +(m.tip  ? '<div><div class="block-label-tip">💡 요리 팁</div><div class="tip-block">'+m.tip+'</div></div>' : '')
    +'</div>'
    +'</div>';
}

function toggle(id) {
  var body = document.getElementById(id);
  var idx  = id.replace('m','');
  var arr  = document.getElementById('arr'+idx);
  var open = body.classList.toggle('open');
  if (arr) arr.classList.toggle('open', open);
}

function setTab(key, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var el  = document.getElementById('tab-content');
  var day = DAYS[key];
  var html = '';

  // 하루 합계 카드 (사전준비 제외)
  if (day.summary) {
    var s = day.summary;
    html += '<div class="day-summary">'
      +'<div class="day-summary-title">'+day.label+' 합계 '
      +'<span style="font-size:11px;font-weight:500;color:var(--text-3);">'+day.tag+'</span></div>'
      +'<div class="day-badges">'
      +'<span class="d-badge d-kcal">'+s.kcal+'kcal</span>'
      +'<span class="d-badge d-pro">단백질 '+s.pro+'g</span>'
      +'<span class="d-badge d-kcal">탄수 '+s.carb+'g</span>'
      +'<span class="d-badge d-na">나트륨 '+s.na+'mg</span>'
      +'</div>'
      +'<div style="font-size:12px;color:var(--text-2);margin-top:8px;">'+s.note+'</div>'
      +'</div>';
  }

  // 식사 카드
  day.meals.forEach(function(m, i){ html += mealCardHTML(m, key+i); });
  el.innerHTML = html;
}

// 오늘 요일에 맞는 탭 자동 선택
var dowMap = {0:'sun',1:'mon',2:'tue',3:'wed',4:'thsat',5:'fri',6:'thsat'};
// 일=0,월=1,화=2,수=3,목=4,금=5,토=6
var todayKey = dowMap[new Date().getDay()];
var tabBtns  = document.querySelectorAll('.tab');
var tabKeys  = ['mon','tue','wed','thsat','fri','sun','prep'];
var activeIdx = tabKeys.indexOf(todayKey);
if (activeIdx < 0) activeIdx = 0;
setTab(tabKeys[activeIdx], tabBtns[activeIdx]);
</script>
