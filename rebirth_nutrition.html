<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 Re-birth 식단 레시피 & 영양 성분표</title>
<style>
  :root {
    --teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --blue:#185FA5;--blue-light:#EBF4FD;
    --bg:#FAFAF8;--surface:#F3F2EE;--white:#fff;
    --border:rgba(0,0,0,0.08);--text:#1C1C1A;--text-2:#6B6B67;--text-3:#9E9E9A;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrapper{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

  /* 헤더 */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);background:var(--surface);border:0.5px solid var(--border);padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;text-decoration:none;transition:background 0.15s;}
  .back-btn:hover{background:var(--teal-light);color:var(--teal-dark);}
  .header-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text-3);margin-top:3px;}

  /* 목표 배너 */
  .goal-banner{background:var(--teal-light);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:1.25rem;font-size:13px;color:var(--teal-dark);font-weight:500;line-height:1.6;}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tab{font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;}
  .tab.active{background:var(--teal-dark);color:white;border-color:var(--teal-dark);}

  /* 섹션 타이틀 */
  .sec-title{font-size:13px;font-weight:700;color:var(--text);margin:1rem 0 8px;padding-bottom:6px;border-bottom:1.5px solid var(--teal-light);}

  /* 메인 카드 */
  .meal-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
  .meal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);cursor:pointer;user-select:none;}
  .meal-header:hover{background:#EAF5F0;}
  .meal-name{font-size:14px;font-weight:700;color:var(--text);}
  .meal-cond{font-size:11px;color:var(--text-3);margin-top:3px;}
  .meal-arrow{font-size:12px;color:var(--text-3);transition:transform 0.2s;flex-shrink:0;}
  .meal-arrow.open{transform:rotate(180deg);}
  .meal-body{display:none;padding:16px;}
  .meal-body.open{display:block;}

  /* 영양 뱃지 */
  .n-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .n-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
  .n-kcal{background:#FEF3C7;color:#92400E;}
  .n-pro {background:#D1FAE5;color:#065F46;}
  .n-carb{background:#DBEAFE;color:#1E40AF;}
  .n-fat {background:#FCE7F3;color:#9D174D;}
  .n-na  {background:#FEE2E2;color:#991B1B;}
  .n-warn{font-size:11px;color:#991B1B;font-weight:600;margin-bottom:8px;}

  /* 성분 테이블 */
  .ing-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;}
  .ing-table th{background:rgba(0,0,0,0.03);font-size:10px;font-weight:700;color:var(--text-3);text-align:left;padding:6px 10px;}
  .ing-table td{padding:6px 10px;border-top:0.5px solid var(--border);color:var(--text);}
  .ing-table .total-row td{font-weight:700;background:var(--teal-light);color:var(--teal-dark);}

  /* 레시피 블록 */
  .recipe-block{margin-top:4px;}
  .block{margin-bottom:12px;}
  .block-label{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
  .block-content{font-size:13px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;}
  .block-content.steps{border-left:2px solid var(--teal-light);background:transparent;padding-left:12px;}

  /* 구분선 */
  .divider{height:1px;background:var(--border);margin:14px 0;}

  /* 영양제 */
  .supp-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
  .supp-name{font-size:14px;font-weight:700;color:var(--text);}
  .supp-timing{font-size:11px;color:var(--teal-dark);font-weight:600;background:var(--teal-light);padding:2px 8px;border-radius:12px;margin-top:4px;display:inline-block;}
  .supp-note{font-size:12px;color:var(--text-2);margin-top:6px;line-height:1.5;}
  .supp-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:#FEE2E2;color:#991B1B;}
  .supp-badge.required{background:var(--teal-light);color:var(--teal-dark);}

  @media(max-width:540px){
    .wrapper{padding:1rem 0.875rem 3rem;}
    .header-title{font-size:17px;}
    .ing-table{font-size:11px;}
    .ing-table th,.ing-table td{padding:5px 7px;}
    .meal-name{font-size:13px;}
    .tabs{gap:4px;}
    .tab{font-size:11px;padding:6px 11px;}
  }
</style>
</head>
<body>

    <a class="back-btn" href="rebirth_dashboard.html">← 대시보드로</a>
    <div>

    steps:`사전 준비 — 두부 수분 제거(가장 중요): 두부 1모를 키친타올로 감싸 물기를 닦아낸 뒤, 기름을 두르지 않은 마른 팬에 약불로 잘게 부수면서 볶아 수분을 완전히 날려 소보로(모래알) 상태로 만들어요. 볶은 두부는 볼에 옮겨 한 김 식혀요.\n사전 준비 — 당근 손질: 당근 30g을 잘게 다져 준비해요.\n① 반죽 배합[불 없음]: 볼에 식힌 두부 소보로 + 다진 당근 + 계란 1개 + 참기름 5cc + 후추 한 꼬집을 넣고 골고루 섞어요.\n② 마늘 볶기[약불]: 팬에 올리브유 10cc를 두르고 다진 마늘 5g을 넣어 노릇해질 때까지 천천히 볶아요.\n③ 두부 반죽 볶기[중약불]: 마늘 향이 나면 불을 중약불로 올리고, ①의 반죽을 전량 투입해요. 주걱으로 덩어리를 부수면서 3~4분간 골고루 볶아요. 계란이 완전히 익고 두부가 고슬고슬해지면 불을 꺼요.\n④ 계란 후라이[중약불]: 같은 팬에 기름 추가 없이 계란 1개를 올려 반숙/완숙 취향대로 익힌 뒤, 도시락통의 볶음밥 위에 올려요.\n⑤ 마무리: 스리라차 소스 5cc를 계란 후라이 위에 뿌려 완성해요.`
  },
  {
    cat:'lunch', name:'양배추 치즈 햄 계란말이', cond:'일요일',
    ingredients:`계란 150g (약 3개), 닭가슴살 햄(슬라이스) 3장, 양배추(가늘게 채썰기) 100g, 저염 슬라이스 치즈 1장\n소스: 올리브오일 7cc, 후추 한 꼬집\n※ 소금 간 절대 금지`,
    steps:`전처리(통풍 필수): 닭가슴살 햄 3장을 끓는 물에 1분간 데쳐 나트륨·퓨린 제거 후 잘게 다집니다.\n양배추 수분 제거(핵심): 채 썬 양배추 100g을 마른 팬에 약불로 1~2분 볶아 수분을 완전히 날립니다.\n계란물 배합: 계란 3개에 후추를 넣어 풀고, 식힌 양배추와 다진 햄을 넣어 배합합니다.\n1차 부침: 팬에 올리브오일 7cc를 두르고 중약불로 예열 후 계란물을 부어 치즈를 중앙에 올립니다.\n말기: 치즈가 살짝 녹으면 돌돌 말아 이음매가 아래로 가게 눌러 완성합니다.`
  },
  {
    cat:'lunch', name:'두부면 까르보나라', cond:'월요일',
    ingredients:`두부면 200g, 닭가슴살 햄 4장, 계란 2개, 파마산 치즈 20g\n소스: 올리브유 5cc, 마늘 2개(편 썰기) 10g, 후추 한 꼬집`,
    steps:`사전 준비: 볼에 계란 2개를 풀고 파마산 치즈 10g과 후추를 미리 섞어둡니다. 닭가슴살 햄은 끓는 물에 1분 데쳐 한 입 크기로 잘라둡니다.\n두부면 물기 제거: 체망에 넣고 찬물로 헹군 뒤 손으로 꽉 짜 수분을 최대한 제거합니다.\n마늘 기름 & 햄 볶기: 팬에 올리브유와 편 썬 마늘을 약불로 노릇해질 때까지 볶고 햄을 중불에서 30초 볶습니다.\n두부면 투입 & 불 끄기(핵심): 두부면을 넣고 30초 볶은 뒤 반드시 불을 끄고 10~15초 식힙니다.\n소스 코팅: 불 꺼진 상태에서 계란+치즈 소스를 붓고 빠르게 버무려 완성합니다.`
  },
  {
    cat:'dinner', name:'두부 부침 정식', cond:'매일 저녁 (수·금은 계란 3개)',
    ingredients:`밥: 미트리 볶음밥 1/2팩 (100g) — 나머지 반은 밀봉 냉동\n두부: 두부 1/2모 (150g)\n단백질: 계란 2개, 닭가슴살 소시지 1/2팩\n오일: 올리브유 15cc\n※ 소금 간 절대 금지`,
    steps:`닭가슴살 데치기: 소시지 1/2팩을 뜨거운 물에 담갔다 꺼내어 껍질을 벗겨줍니다.\n두부 굽기[중불]: 팬에 올리브오일을 두르고 두부를 도톰하게 썰어 앞뒤로 노릇하게 굽습니다.\n계란 후라이[중약불]: 두부 옆 공간에 계란 2개를 취향대로 익힙니다.\n볶음밥 데우기[중불]: 볶음밥 반 팩을 2분간 볶습니다.\n플레이팅: 접시에 볶음밥 + 구운 두부 + 계란 + 데친 소시지를 정식처럼 담아냅니다.`

var SUPP = [
  { name:'유산균 (락토핏)', timing:'기상 직후 공복', required:true, note:'유산균 200억 CFU / 장 건강 유지' },
  { name:'비맥스 정 골드', timing:'점심 식후', required:true, note:'비타민B1·B2·B6·B12 / 니아신·판토텐산 / 점심 식후 복용 필수' },
  { name:'콜히친 (비상약)', timing:'통풍 증상 즉시', required:false, note:'통풍 발작 시 즉시 복용 + 물 500ml / 열감·통증 감지 시' }
];

// ── 카드 HTML 생성 ─────────────────────────────────────────
function nutritionTableHTML(n) {
  if (!n) return '';
  var rows = n.items.map(function(it){
    return '<tr><td>'+it.food+'</td><td>'+it.amount+'</td><td>'+it.kcal+'</td><td>'+it.pro+'</td><td>'+it.carb+'</td><td>'+it.fat+'</td><td>'+it.na+'</td></tr>';
  }).join('');
  return '<div class="n-badges">'
    + '<span class="n-badge n-kcal">'+n.total.kcal+'kcal</span>'
    + '<span class="n-badge n-pro">단백질 '+n.total.pro+'g</span>'
    + '<span class="n-badge n-carb">탄수 '+n.total.carb+'g</span>'
    + '<span class="n-badge n-fat">지방 '+n.total.fat+'g</span>'
    + '<span class="n-badge n-na">나트륨 '+n.total.na+'mg</span>'
    + '</div>'
    + (n.warn ? '<div class="n-warn">'+n.warn+'</div>' : '')
    + '<table class="ing-table">'
    + '<thead><tr><th>식품</th><th>섭취량</th><th>칼로리</th><th>단백질</th><th>탄수</th><th>지방</th><th>나트륨</th></tr></thead>'
    + '<tbody>'+rows
    + '<tr class="total-row"><td colspan="2">합계</td><td>'+n.total.kcal+'</td><td>'+n.total.pro+'</td><td>'+n.total.carb+'</td><td>'+n.total.fat+'</td><td>'+n.total.na+'</td></tr>'
    + '</tbody></table>';
}

function cardHTML(r, idx, defaultOpen) {
  var n = NUTRITION[r.name];
  var bodyClass = defaultOpen ? 'meal-body open' : 'meal-body';
  var arrowClass = defaultOpen ? 'meal-arrow open' : 'meal-arrow';
  return '<div class="meal-card">'
    + '<div class="meal-header" onclick="toggle(\'b'+idx+'\')">'
    +   '<div><div class="meal-name">'+r.name+'</div>'+(r.cond?'<div class="meal-cond">'+r.cond+'</div>':'')+'</div>'
    +   '<span class="meal-arrow" id="arr'+idx+'">▼</span>'
    + '</div>'
    + '<div class="'+bodyClass+'" id="b'+idx+'">'
    +   (n ? nutritionTableHTML(n) : '')
    +   '<div class="divider"></div>'
    +   '<div class="recipe-block">'
    +     '<div class="block"><div class="block-label">🛒 재료</div><div class="block-content">'+r.ingredients+'</div></div>'
    +     '<div class="block"><div class="block-label">👨‍🍳 조리법</div><div class="block-content steps">'+r.steps+'</div></div>'
    +   '</div>'
    + '</div>'
    + '</div>';
  // arrow 초기화
}

function toggle(id) {
  var body = document.getElementById(id);
  var idx  = id.replace('b','');
  var arr  = document.getElementById('arr'+idx);
  var open = body.classList.toggle('open');
  if (arr) arr.classList.toggle('open', open);
}

// ── 탭 렌더 ───────────────────────────────────────────────
function setTab(cat, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');

  var el = document.getElementById('tab-content');
  var filtered = RECIPES.filter(function(r){ return r.cat === cat; });
  var html = '';

  // 아침/저녁은 기본 펼침, 점심/사전준비는 기본 접힘
  var defaultOpen = (cat === 'morning' || cat === 'dinner');

  if (cat === 'supp') {
    SUPP.forEach(function(s){
      html += '<div class="supp-card">'
        +'<div><div class="supp-name">'+s.name+'</div>'
        +'<div class="supp-timing">'+s.timing+'</div>'
        +'<div class="supp-note">'+s.note+'</div></div>'
        +'<span class="supp-badge'+(s.required?' required':'')+'">'+( s.required ? '필수' : '비상약')+'</span>'
        +'</div>';
    });
  } else {
    filtered.forEach(function(r, i){
      html += cardHTML(r, cat+i, defaultOpen);
    });
  }

  el.innerHTML = html;
}

// 초기 렌더
setTab('morning', document.querySelector('.tab.active'));
</script>
</body>
</html>
